name: Deploy Frontend And Render Backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL || 'https://api.buyernodus.com' }}

      - name: Deploy frontend to public_html
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.CPANEL_FTP_HOST }}
          username: ${{ secrets.CPANEL_FTP_USERNAME }}
          password: ${{ secrets.CPANEL_FTP_PASSWORD }}
          protocol: ftp
          port: ${{ secrets.CPANEL_FTP_PORT || 21 }}
          local-dir: ./dist/
          server-dir: ${{ vars.CPANEL_FRONTEND_DIR || '/public_html/' }}
          state-name: .ftp-state-frontend.json

      - name: Require Render deploy hook
        if: ${{ env.RENDER_DEPLOY_HOOK_URL == '' }}
        run: |
          echo "::error::Missing GitHub Actions secret RENDER_DEPLOY_HOOK_URL. Add the Render deploy hook URL as a repository secret to deploy the backend."
          exit 1

      - name: Trigger Render backend deploy
        run: curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL"
